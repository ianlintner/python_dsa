name: Caretaker

on:
  schedule:
    - cron: "0 8 * * 1"
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]
  check_suite:
    types: [completed]
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "full"
        type: choice
        options: [full, pr-only, issue-only, upgrade-only, dry-run]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  maintain:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install caretaker
        run: |
          VERSION=$(cat .github/maintainer/.version)
          pip install "caretaker @ git+https://github.com/ianlintner/caretaker.git@v${VERSION}"

      - name: Run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CARETAKER_EVENT_PAYLOAD: ${{ toJSON(github.event) }}
          CARETAKER_RUN_MODE: ${{ github.event.inputs.mode || 'full' }}
          CARETAKER_EVENT_TYPE: ${{ github.event_name }}
        run: |
          caretaker run \
            --config .github/maintainer/config.yml \
            --mode "$CARETAKER_RUN_MODE" \
            --event-type "$CARETAKER_EVENT_TYPE" \
            --event-payload "$CARETAKER_EVENT_PAYLOAD"

  # When the caretaker run itself fails, trigger the self-heal agent
  self-heal-on-failure:
    runs-on: ubuntu-latest
    needs: maintain
    if: failure()
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install caretaker
        run: |
          VERSION=$(cat .github/maintainer/.version)
          pip install "caretaker @ git+https://github.com/ianlintner/caretaker.git@v${VERSION}"

      - name: Self-heal — analyse own failure
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CARETAKER_FAILED_RUN_ID: ${{ github.run_id }}
          CARETAKER_EVENT_PAYLOAD: >-
            {
              "workflow_run": {
                "id": ${{ github.run_id }},
                "name": "Caretaker",
                "conclusion": "failure",
                "head_branch": "${{ github.ref_name }}"
              }
            }
        run: |
          caretaker run \
            --config .github/maintainer/config.yml \
            --mode self-heal \
            --event-type workflow_run \
            --event-payload "$CARETAKER_EVENT_PAYLOAD"
